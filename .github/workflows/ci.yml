name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run test suite
        run: pytest tests/ -v --tb=short

  build-mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test (server starts without crashing)
        run: |
          node dist/index.js < /dev/null &
          PID=$!
          sleep 3
          if kill -0 "$PID" 2>/dev/null; then
            echo "Server still running after 3s. Smoke test passed."
            kill "$PID" 2>/dev/null || true
            wait "$PID" 2>/dev/null || true
          else
            echo "Server exited (expected for stdio server with no stdin). Checking exit code."
            wait "$PID" 2>/dev/null
            EXIT_CODE=$?
            if [ "$EXIT_CODE" -le 1 ]; then
              echo "Clean exit (code $EXIT_CODE). Smoke test passed."
            else
              echo "Server crashed with exit code $EXIT_CODE."
              exit 1
            fi
          fi

  build-npm-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mobile-dev-tools
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: packages/mobile-dev-tools/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
